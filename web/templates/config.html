<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts — S3 Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        surface: '#111111',
                        'surface-hover': '#1a1a1a',
                        'bg-elevated': '#0a0a0a',
                        border: '#222222',
                        'border-hover': '#333333',
                        accent: '#5e6ad2',
                        'accent-hover': '#6b76e3',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="min-h-screen bg-black text-white font-sans antialiased selection:bg-accent/30">
    <div class="max-w-5xl mx-auto px-6 py-8">
        <header class="flex items-center justify-between h-14 mb-10">
            <div class="text-base font-semibold tracking-tight">S3 Monitor</div>
            <nav class="flex items-center gap-1">
                <a href="/" class="px-4 py-2 text-sm font-medium text-neutral-500 hover:text-white hover:bg-surface rounded-md transition-colors">Dashboard</a>
                <a href="/config" class="px-4 py-2 text-sm font-medium text-white bg-surface rounded-md transition-colors">Accounts</a>
                <a href="/settings" class="px-4 py-2 text-sm font-medium text-neutral-500 hover:text-white hover:bg-surface rounded-md transition-colors">Settings</a>
            </nav>
        </header>

        <main>
            <section class="bg-surface border border-border rounded-lg p-6 mb-6">
                <h2 id="formTitle" class="text-sm font-semibold mb-5">Add account</h2>
                <form id="accountForm">
                    <input type="hidden" id="accountId" name="id">

                    <div class="mb-4">
                        <label for="name" class="block text-xs font-medium text-neutral-500 mb-1.5">Account name</label>
                        <input type="text" id="name" name="name" required placeholder="Production AWS"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                    </div>

                    <div class="mb-4">
                        <label for="access_key" class="block text-xs font-medium text-neutral-500 mb-1.5">Access key ID</label>
                        <input type="text" id="access_key" name="access_key" required placeholder="AKIA..."
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                    </div>

                    <div class="mb-4">
                        <label for="secret_key" class="block text-xs font-medium text-neutral-500 mb-1.5">Secret access key</label>
                        <input type="password" id="secret_key" name="secret_key" required placeholder="••••••••"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                    </div>

                    <div class="mb-4">
                        <label for="region" class="block text-xs font-medium text-neutral-500 mb-1.5">Region</label>
                        <input type="text" id="region" name="region" value="us-east-1" placeholder="us-east-1"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                    </div>

                    <div class="mb-4">
                        <label for="endpoint" class="block text-xs font-medium text-neutral-500 mb-1.5">Custom endpoint</label>
                        <input type="text" id="endpoint" name="endpoint" placeholder="https://minio.example.com"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                        <p class="mt-1.5 text-[11px] text-neutral-600 font-medium">Optional. For S3-compatible services like MinIO or Wasabi.</p>
                    </div>

                    <div class="mb-4">
                        <label for="bucket" class="block text-xs font-medium text-neutral-500 mb-1.5">Bucket</label>
                        <input type="text" id="bucket" name="bucket" placeholder="my-bucket"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                        <p class="mt-1.5 text-[11px] text-neutral-600 font-medium">Leave empty to monitor all buckets in the account.</p>
                    </div>

                    <div class="mb-4">
                        <label for="quota" class="block text-xs font-medium text-neutral-500 mb-1.5">Quota</label>
                        <div class="flex gap-2">
                            <input type="number" id="quota" name="quota" step="0.1" value="10" min="0"
                                class="flex-1 px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                            <select id="quota_unit" name="quota_unit"
                                class="px-3 py-2 bg-black border border-border rounded-md text-sm text-white focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors min-w-[80px]">
                                <option value="GB" selected>GB</option>
                                <option value="TB">TB</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="threshold" class="block text-xs font-medium text-neutral-500 mb-1.5">Threshold</label>
                        <input type="number" id="threshold" name="threshold" value="80" min="1" max="100"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                        <p class="mt-1.5 text-[11px] text-neutral-600 font-medium">Percentage at which to trigger a warning.</p>
                    </div>

                    <div class="mb-4">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" id="telegram_enabled" name="telegram_enabled"
                                class="w-4 h-4 accent-accent rounded cursor-pointer">
                            <span class="text-sm text-white">Enable Telegram notifications</span>
                        </label>
                    </div>

                    <div class="telegram-fields hidden mb-4">
                        <label for="telegram_bot_token" class="block text-xs font-medium text-neutral-500 mb-1.5">Bot token</label>
                        <input type="text" id="telegram_bot_token" name="telegram_bot_token" placeholder="123456:ABC..."
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                    </div>

                    <div class="telegram-fields hidden mb-4">
                        <label for="telegram_chat_id" class="block text-xs font-medium text-neutral-500 mb-1.5">Chat ID</label>
                        <input type="text" id="telegram_chat_id" name="telegram_chat_id" placeholder="-1001234567890"
                            class="w-full px-3 py-2 bg-black border border-border rounded-md text-sm text-white placeholder-neutral-600 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent/20 transition-colors">
                    </div>

                    <div class="flex items-center gap-3 pt-4 mt-5 border-t border-border">
                        <button type="submit" id="submitBtn"
                            class="inline-flex items-center justify-center px-3.5 py-1.5 text-sm font-medium text-white bg-accent hover:bg-accent-hover rounded-md transition-colors active:scale-[0.98]">Add account</button>
                        <button type="button" onclick="resetForm()"
                            class="text-sm font-medium text-neutral-500 hover:text-white transition-colors">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="mt-8">
                <h2 class="text-sm font-semibold mb-4">Configured accounts</h2>
                <div class="overflow-x-auto">
                    <table id="accountsTable" class="w-full text-sm">
                        <thead>
                            <tr class="text-left">
                                <th class="text-xs font-medium text-neutral-500 pb-3">Name</th>
                                <th class="text-xs font-medium text-neutral-500 pb-3">Region</th>
                                <th class="text-xs font-medium text-neutral-500 pb-3">Bucket</th>
                                <th class="text-xs font-medium text-neutral-500 pb-3">Quota</th>
                                <th class="text-xs font-medium text-neutral-500 pb-3">Threshold</th>
                                <th class="text-xs font-medium text-neutral-500 pb-3">Telegram</th>
                                <th class="text-xs font-medium text-neutral-500 pb-3 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 px-5 py-3 bg-surface border border-border rounded-lg text-sm font-medium text-white shadow-xl transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

    <script>
        const form = document.getElementById('accountForm');
        const telegramCheckbox = document.getElementById('telegram_enabled');
        const telegramFields = document.querySelectorAll('.telegram-fields');
        const toast = document.getElementById('toast');

        telegramCheckbox.addEventListener('change', () => {
            telegramFields.forEach(el => el.classList.toggle('hidden', !telegramCheckbox.checked));
        });

        function showToast(message) {
            toast.textContent = message;
            toast.classList.remove('translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        async function parseResponse(res) {
            const text = await res.text();
            try { return JSON.parse(text); }
            catch { return { success: false, error: text || ('HTTP ' + res.status) }; }
        }

        function buildFormData() {
            const fd = new FormData();
            fd.append('name', document.getElementById('name').value);
            fd.append('access_key', document.getElementById('access_key').value);
            fd.append('secret_key', document.getElementById('secret_key').value);
            fd.append('region', document.getElementById('region').value);
            fd.append('endpoint', document.getElementById('endpoint').value);
            fd.append('bucket', document.getElementById('bucket').value);
            fd.append('quota', document.getElementById('quota').value);
            fd.append('quota_unit', document.getElementById('quota_unit').value);
            fd.append('threshold', document.getElementById('threshold').value);
            if (telegramCheckbox.checked) fd.append('telegram_enabled', 'on');
            fd.append('telegram_bot_token', document.getElementById('telegram_bot_token').value);
            fd.append('telegram_chat_id', document.getElementById('telegram_chat_id').value);
            return fd;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = buildFormData();
            const accountId = document.getElementById('accountId').value;
            let url = '/api/accounts';
            let method = 'POST';
            if (accountId) url = '/api/accounts/' + accountId;

            try {
                const res = await fetch(url, { method, body: formData });
                const data = await parseResponse(res);
                if (data.success) {
                    resetForm();
                    loadAccounts();
                    showToast(accountId ? 'Account updated' : 'Account added');
                } else {
                    showToast('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                showToast('Request failed: ' + err);
            }
        });

        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                if (!res.ok) return;
                const accounts = await res.json();
                const tbody = document.querySelector('#accountsTable tbody');
                tbody.innerHTML = accounts.map(a => `
                    <tr class="hover:bg-bg-elevated/50 transition-colors">
                        <td class="py-2.5 px-4 border-b border-border">${a.name}</td>
                        <td class="py-2.5 px-4 border-b border-border">${a.region}</td>
                        <td class="py-2.5 px-4 border-b border-border">${a.bucket || 'All buckets'}</td>
                        <td class="py-2.5 px-4 border-b border-border">${formatBytes(a.quota_bytes)}</td>
                        <td class="py-2.5 px-4 border-b border-border">${a.threshold_percent}%</td>
                        <td class="py-2.5 px-4 border-b border-border">${a.telegram_enabled ? 'On' : 'Off'}</td>
                        <td class="py-2.5 px-4 border-b border-border">
                            <div class="flex items-center justify-end gap-2">
                                <button onclick="editAccount(${a.id})" class="inline-flex items-center justify-center px-3 py-1 text-xs font-medium text-neutral-400 border border-border hover:text-white hover:bg-surface-hover rounded-md transition-colors">Edit</button>
                                <button onclick="deleteAccount(${a.id})" class="inline-flex items-center justify-center px-3 py-1 text-xs font-medium text-red-400 border border-border hover:bg-red-400/10 hover:border-red-400/30 rounded-md transition-colors">Delete</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Failed to load accounts:', err);
            }
        }

        async function editAccount(id) {
            try {
                const res = await fetch('/api/accounts/' + id);
                if (!res.ok) { showToast('Failed to load account'); return; }
                const a = await res.json();

                document.getElementById('accountId').value = a.id;
                document.getElementById('name').value = a.name;
                document.getElementById('access_key').value = a.access_key;
                document.getElementById('secret_key').value = a.secret_key;
                document.getElementById('region').value = a.region;
                document.getElementById('endpoint').value = a.endpoint || '';
                document.getElementById('bucket').value = a.bucket || '';
                document.getElementById('quota').value = (a.quota_bytes / (1024*1024*1024)).toFixed(2);
                document.getElementById('threshold').value = a.threshold_percent;
                telegramCheckbox.checked = a.telegram_enabled;
                document.getElementById('telegram_bot_token').value = a.telegram_bot_token || '';
                document.getElementById('telegram_chat_id').value = a.telegram_chat_id || '';

                telegramFields.forEach(el => el.classList.toggle('hidden', !a.telegram_enabled));
                document.getElementById('formTitle').textContent = 'Edit account';
                document.getElementById('submitBtn').textContent = 'Save changes';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                showToast('Failed to load account');
            }
        }

        async function deleteAccount(id) {
            if (!confirm('Delete this account?')) return;
            try {
                const res = await fetch('/api/accounts/' + id, { method: 'DELETE' });
                const data = await parseResponse(res);
                if (data.success) {
                    loadAccounts();
                    showToast('Account deleted');
                } else {
                    showToast('Failed to delete: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                showToast('Failed to delete: ' + err);
            }
        }

        function resetForm() {
            form.reset();
            document.getElementById('accountId').value = '';
            document.getElementById('formTitle').textContent = 'Add account';
            document.getElementById('submitBtn').textContent = 'Add account';
            telegramFields.forEach(el => el.classList.add('hidden'));
        }

        function formatBytes(bytes) {
            if (bytes >= 1024*1024*1024*1024) return (bytes / (1024*1024*1024*1024)).toFixed(2) + ' TB';
            if (bytes >= 1024*1024*1024) return (bytes / (1024*1024*1024)).toFixed(2) + ' GB';
            return bytes + ' B';
        }

        loadAccounts();
    </script>
</body>
</html>
